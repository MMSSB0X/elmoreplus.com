<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Elmore Plus</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-bar">
        <div class="header-content" style="justify-content: center;">
            <div class="logo-area">
                <div class="logo-icon"><img src="images/elmore-plus.png" class="logo-img" alt=""></div>
 
                <!-- <div class="logo-icon"><i class="ph-fill ph-hexagon"></i></div>
                <h1>ELMOREPLUS</h1> -->
            </div>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
<h2>Welcome Back</h2>
<p class="auth-subtitle">Log in to see what Gumball broke today.</p>

<form id="login-form">
    <div class="input-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required placeholder="gumball@elmore.com">
    </div>
    <div class="input-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" required placeholder="••••••••">
    </div>
    
    <div class="funny-checkbox-container">
        <input type="checkbox" id="login-human" required>
        <label for="login-human">Check this box to prove you aren't an evil duplicate from another dimension.</label>
    </div>

    <p id="login-error" class="error-message"></p>
    
    <button type="submit" class="auth-btn">ENTER THE MADNESS</button>
</form>
            <div class="auth-links">
                <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
