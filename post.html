<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Elmore Plus</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="main.js"></script>
    <script type="module" src="post.js"></script>
    <script type="module" src="load.js"></script>
</head>
<body>

    <header class="top-bar nav-center">
        <div class="header-content">
            <div class="logo-area">
                <a href="index.html"><img src="images/elmore-plus.png" class="logo-img" alt="Elmore Plus"></a>
            </div>
            <nav class="main-nav">
                <a href="index.html">HOME</a>
                <a href="profile.html">MY ACCOUNT</a>
                <a href="friends.html">FRIENDS</a>
            </nav>
        </div>
    </header>

    <div class="container layout-grid" style="grid-template-columns: 1fr; max-width: 800px;">
        <main class="feed">
            <button class="auth-btn" style="width: auto; background: var(--bg-gray); color: var(--nav-blue-dark); border: 2px solid var(--border-color);" onclick="window.history.back()">
                <i class="ri-arrow-left-line"></i> Go Back
            </button>

            <!-- Original Post Loads Here -->
            <div id="single-post-container"></div>

            <!-- Comments Section -->
            <div class="comments-container">
                <h3 style="color: var(--nav-blue-dark); margin-bottom: 15px;">Comments</h3>
                
                <div class="comment-input-box">
                    <img src="https://placehold.co/40" id="my-comment-pic" class="comment-avatar">
                    <input type="text" id="comment-input" placeholder="Write a comment..." autocomplete="off">
                    <button id="send-comment" class="auth-btn signup-btn" style="width: auto; padding: 0 20px; margin: 0; border-radius: 12px;">
                        <i class="ri-send-plane-fill"></i>
                    </button>
                </div>

                <div id="comments-list">
                    <p style="text-align: center; color: #888;">Loading comments...</p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
