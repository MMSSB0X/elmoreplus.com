<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Elmore Plus</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-bar">
        <div class="header-content" style="justify-content: center;">
            <div class="logo-area">
                <div class="logo-icon"><img src="images/elmore-plus.png" class="logo-img" alt=""></div>
   
                <!-- <div class="logo-icon"><i class="ph-fill ph-hexagon"></i></div>
                <h1>ELMOREPLUS</h1> -->
            </div>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
<h2>Join Elmore Plus</h2>
<p class="auth-subtitle">Create an account before Tobias takes your username!</p>

<form id="signup-form">
    <div class="input-group">
        <label for="signup-name">Display Name</label>
        <input type="text" id="signup-name" required placeholder="e.g., Banana Joe (Don't use your real name if hiding from Tina)">
    </div>

    <div class="input-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" required placeholder="darwin@elmore.com">
    </div>
    
    <div class="input-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" required placeholder="No, 'password' is not a password">
        <p id="password-meter" class="funny-meter">Strength: Waiting for you to type...</p>
    </div>

    <div class="funny-checkbox-container">
        <input type="checkbox" id="anti-bobert" required>
        <label for="anti-bobert">I promise I am not Bobert trying to upload a virus.</label>
    </div>
    
    <p id="signup-error" class="error-message"></p>
    
    <button type="submit" class="auth-btn signup-btn" id="signup-btn-submit">CREATE ACCOUNT</button>
</form>
            
            <div class="auth-links">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
